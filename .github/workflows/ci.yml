name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch. Saves CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    name: Build (Vercel-equivalent)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up database env
        run: |
          echo 'DATABASE_URL=postgresql://stub:stub@localhost:5432/stub' >> $GITHUB_ENV
          echo 'AUTH_SECRET=ci-stub-secret-do-not-use-in-prod' >> $GITHUB_ENV
          echo 'NODE_ENV=test' >> $GITHUB_ENV

      - name: Generate Prisma client
        run: npx prisma generate --schema=app/prisma/schema.prisma

      - name: Build
        run: npm run build
